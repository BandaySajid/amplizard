Amplizard (AI Powered Customer service chatbot Project)

- Target Market: Small to medium businesses.

System Design and Architecture: 
  - We will be providing a chatbot service that businesses can integrate into their applications.
  - Businesses would have to create hooks to define the behaviour of the chatbot.
  - For every hook the api associated with it will be called everytime the hook is triggered.

Core Features:
  - Bot creation and management.
  - Hook creation and management.
  - NLP (prebuilt apis) for chat-message to hook recognition.
  - Action hook definition and triggering.
  - [consider] Realtime Chatbox : Amplizard would stream the complex queries to that chatbox, where customer service would be able to act on that query.

